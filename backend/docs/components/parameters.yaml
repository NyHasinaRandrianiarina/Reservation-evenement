# Common query parameters for future paginated endpoints.

Page:
  name: page
  in: query
  description: Page number (1-indexed).
  required: false
  schema:
    type: integer
    minimum: 1
    default: 1

PerPage:
  name: per_page
  in: query
  description: Number of items per page.
  required: false
  schema:
    type: integer
    minimum: 1
    maximum: 100
    default: 20
